name: Refresh Tournament DB

on:
  schedule:
    # Every day at 09:00 JST (00:00 UTC)
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  refresh-db:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: |
          set -eu
          uv sync

      - name: Run scraper pipeline
        run: |
          set -eu
          uv run python -m src.scraper

      - name: Commit updated SQLite DB
        run: |
          set -eu

          if [ ! -f data/shogi.db ]; then
            echo "Expected DB file not found: data/shogi.db"
            exit 1
          fi

          if [ -z "$(git status --porcelain data/shogi.db)" ]; then
            echo "No DB changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/shogi.db
          git commit -m "chore(data): refresh shogi tournament DB"
          git push
