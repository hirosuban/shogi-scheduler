<!doctype html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>首都圏 将棋大会スケジュール</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <main class="page">
        <section class="hero">
            <p class="kicker">Shuto-Ken Tournament Finder</p>
            <h1>首都圏 将棋大会スケジュール</h1>
            <p class="lead">
                地図でエリアを選び、日付を絞って「行ける大会」をすぐに探せます。
            </p>
        </section>

        <section class="controls" aria-label="検索条件">
            <div class="control-group">
                <label for="from-date">開始日</label>
                <input id="from-date" name="from-date" type="date" />
            </div>
            <div class="control-group">
                <label for="to-date">終了日</label>
                <input id="to-date" name="to-date" type="date" />
            </div>
            <button id="reset-filters" type="button" class="ghost">フィルタをリセット</button>
        </section>

        <section class="layout" aria-label="地図と大会一覧">
            <article class="panel map-panel">
                <div class="panel-head">
                    <h2>エリア選択</h2>
                    <p id="selected-prefectures" aria-live="polite">未選択（全件表示）</p>
                </div>
                <div id="map" aria-label="首都圏地図"></div>
            </article>

            <article class="panel list-panel">
                <div class="panel-head">
                    <h2>大会一覧</h2>
                    <p id="result-count" aria-live="polite">0件</p>
                </div>

                <p id="loading" class="state loading" hidden>読み込み中...</p>
                <p id="error" class="state error" hidden></p>
                <ul id="tournament-list" class="tournament-list" aria-live="polite"></ul>
            </article>
        </section>
    </main>

    <footer class="site-footer">
        <a href="https://x.com/hirosuban" target="_blank" rel="noreferrer" aria-label="X (@hirosuban)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
            </svg>
        </a>
        <a href="https://github.com/hirosuban/shogi-scheduler" target="_blank" rel="noreferrer"
            aria-label="GitHub (hirosuban)">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">

                    d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z" />

        </a>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="./app.js" defer></script>
</body>

</html>
